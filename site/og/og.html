<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        width: 1200px;
        height: 630px;
        background: #131110;
        color: #e9e5df;
        font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 72px 84px 64px;
      }
      .eyebrow {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #a29a90;
      }
      h1 {
        font-size: 132px;
        font-weight: 700;
        letter-spacing: -0.015em;
        line-height: 1;
        margin: 8px 0 36px;
      }
      .rule {
        width: 72px;
        height: 6px;
        background: #e58a68;
        margin-bottom: 36px;
      }
      .subtitle {
        font-size: 39px;
        line-height: 1.35;
        color: #cfc8bf;
        max-width: 21em;
      }
      .footer {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-size: 24px;
        color: #a29a90;
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="eyebrow">Open research · Living draft</div>
      <h1>KamiBench</h1>
      <div class="rule"></div>
      <div class="subtitle">
        An Autonomous On-Chain World as a Benchmark for Long-Horizon, Self-Sustaining
        Agents
      </div>
    </div>
    <div class="footer">
      <span>github.com/tokedo/KamiBench</span>
      <span>@0xTokedo</span>
    </div>
  </body>
</html>
